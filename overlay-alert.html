<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mackinac — Alert Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; font-family: 'Arial', sans-serif; width: 420px; padding: 8px; }

.alert-card {
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 18px;
    backdrop-filter: blur(14px);
    /* Hidden by default */
    opacity: 0;
    transform: translateX(60px);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.4s, box-shadow 0.4s;
    pointer-events: none;
}
.alert-card.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}
.alert-card.near-bridge {
    border-color: rgba(239,83,80,0.55);
    box-shadow: 0 0 35px rgba(239,83,80,0.3);
    animation: nearGlow 1.5s infinite;
}
.alert-card.approaching { border-color: rgba(0,230,118,0.3); }
@keyframes nearGlow {
    0%,100%{box-shadow:0 0 35px rgba(239,83,80,0.3)}
    50%{box-shadow:0 0 55px rgba(239,83,80,0.55)}
}

.top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
}
.alert-icon { font-size: 22px; margin-right: 10px; }
.alert-title { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1.5px; }
.badge {
    font-size: 10px; font-weight: bold;
    padding: 3px 10px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.8px;
}
.badge-approaching { background: rgba(0,230,118,0.15); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
.badge-departing   { background: rgba(255,152,0,0.15);  color: #ff9800; border: 1px solid rgba(255,152,0,0.3); }
.badge-near        { background: rgba(239,83,80,0.2);   color: #ef5350; border: 1px solid rgba(239,83,80,0.45); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

.ship-name { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }

.info-row { display: flex; gap: 20px; }
.info-item { display: flex; flex-direction: column; }
.info-label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
.info-val   { font-size: 15px; font-weight: bold; color: #e0e0e0; }
.info-val.green  { color: #00e676; }
.info-val.orange { color: #ff9800; }
.info-val.red    { color: #ef5350; }
.info-val.cyan   { color: #4fc3f7; }

.dest-line { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 7px; }
.dest-line span { color: rgba(255,255,255,0.55); }

.progress-bar {
    margin-top: 10px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: #00e676;
    border-radius: 2px;
    transition: width 0.8s ease, background 0.4s;
}
</style>
</head>
<body>
<div class="alert-card" id="card">
    <div class="top-row">
        <div style="display:flex;align-items:center;">
            <span class="alert-icon" id="icon">🚢</span>
            <span class="alert-title">Vessel near Mackinac Bridge</span>
        </div>
        <span class="badge" id="badge">Approaching</span>
    </div>
    <div class="ship-name" id="shipName">—</div>
    <div class="info-row">
        <div class="info-item">
            <span class="info-label">Distance</span>
            <span class="info-val" id="dist">—</span>
        </div>
        <div class="info-item">
            <span class="info-label">Speed</span>
            <span class="info-val" id="speed">—</span>
        </div>
        <div class="info-item" id="etaBlock" style="display:none;">
            <span class="info-label">ETA</span>
            <span class="info-val cyan" id="eta">—</span>
        </div>
    </div>
    <div class="dest-line" id="destLine" style="display:none;">→ <span id="dest"></span></div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
</div>

<script>
const RENDER_URL  = 'mackinac-ship-tracker.onrender.com';
const isLocalhost = location.hostname==='localhost'||location.hostname==='127.0.0.1';
const WS_URL      = isLocalhost?`ws://localhost:${location.port||3000}`:`wss://${RENDER_URL}`;
const BRIDGE_LAT=45.8174, BRIDGE_LON=-84.7278;
const SHOW_WITHIN_MI=20; // show card when ship within 20 miles
const MAX_DIST_MI=62;

let shipData={}, staticData={}, ws, reconnectTimer, reconnectAttempts=0;
let hideTimer=null;

function haversine(lat1,lon1,lat2,lon2){
    const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toMiles(km){return km*0.621371;}
function getDirection(lat,lon,course){
    const dLat=lat-BRIDGE_LAT,dLon=lon-BRIDGE_LON;
    const tb=(Math.atan2(-dLon,-dLat)*180/Math.PI+360)%360;
    return Math.abs(((course-tb)+180+360)%360-180)<90?'Approaching':'Departing';
}
function formatETA(distKm,spd){
    if(!spd||spd<0.5)return null;
    const min=Math.round(distKm/(spd*1.852)*60);
    if(min>600)return null;
    return min<60?min+' min':Math.floor(min/60)+'h '+(min%60?min%60+'m':'');
}

function render(){
    const ships=Object.values(shipData)
        .filter(s=>s.speed>0.5&&toMiles(s.distance)<=SHOW_WITHIN_MI)
        .sort((a,b)=>a.distance-b.distance);

    const card=document.getElementById('card');

    if(!ships.length){
        // Fade out and hide
        card.classList.remove('visible','near-bridge','approaching');
        return;
    }

    // Show the closest ship
    const ship=ships[0];
    const sd=staticData[ship.mmsi]||{};
    const mi=toMiles(ship.distance).toFixed(1);
    const isNear=ship.distance<8;
    const eta=ship.direction==='Approaching'?formatETA(ship.distance,ship.speed):null;

    // Progress bar: 0% at 20mi, 100% at bridge
    const pct=Math.min(100,Math.max(0,((SHOW_WITHIN_MI-parseFloat(mi))/SHOW_WITHIN_MI)*100));
    document.getElementById('progress').style.width=pct+'%';
    document.getElementById('progress').style.background=isNear?'#ef5350':ship.direction==='Approaching'?'#00e676':'#ff9800';

    card.className='alert-card visible'+(isNear?' near-bridge':ship.direction==='Approaching'?' approaching':'');

    document.getElementById('icon').textContent=isNear?'⚡':'🚢';
    document.getElementById('shipName').textContent=ship.name;

    const badge=document.getElementById('badge');
    if(isNear){ badge.className='badge badge-near'; badge.textContent='⚡ At Bridge'; }
    else if(ship.direction==='Approaching'){ badge.className='badge badge-approaching'; badge.textContent='▲ Approaching'; }
    else { badge.className='badge badge-departing'; badge.textContent='▼ Departing'; }

    const distEl=document.getElementById('dist');
    distEl.textContent=mi+' mi';
    distEl.className='info-val '+(isNear?'red':ship.direction==='Approaching'?'green':'orange');

    document.getElementById('speed').textContent=ship.speed?ship.speed.toFixed(1)+' kts':'—';

    const etaBlock=document.getElementById('etaBlock');
    if(eta){ etaBlock.style.display='flex'; document.getElementById('eta').textContent=eta; }
    else etaBlock.style.display='none';

    const dest=sd.destination;
    const destLine=document.getElementById('destLine');
    if(dest){ destLine.style.display='block'; document.getElementById('dest').textContent=dest; }
    else destLine.style.display='none';
}

function processMessage(data){
    if(data.MessageType==='ShipStaticData'&&data.Message?.ShipStaticData){
        staticData[data.MetaData.MMSI]={destination:data.Message.ShipStaticData.Destination?.trim()||null};
        render();return;
    }
    if(data.MessageType==='PositionReport'&&data.Message?.PositionReport){
        const pos=data.Message.PositionReport,meta=data.MetaData;
        const dist=haversine(BRIDGE_LAT,BRIDGE_LON,pos.Latitude,pos.Longitude);
        shipData[meta.MMSI]={mmsi:meta.MMSI,name:meta.ShipName?.trim()||'Unknown',
            lat:pos.Latitude,lon:pos.Longitude,speed:pos.Sog||0,course:pos.Cog||0,
            distance:dist,direction:getDirection(pos.Latitude,pos.Longitude,pos.Cog||0),lastUpdate:Date.now()};
        const cut=Date.now()-600000;
        Object.keys(shipData).forEach(k=>{if(shipData[k].lastUpdate<cut)delete shipData[k];});
        render();
    }
}
function manualRetry(){reconnectAttempts=0;connect();}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&(!ws||ws.readyState===WebSocket.CLOSED))manualRetry();});
function connect(){
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
    ws=new WebSocket(WS_URL);
    ws.onopen=()=>{reconnectAttempts=0;};
    ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='ship_data')processMessage(m.data);}catch{}};
    ws.onerror=()=>{};
    ws.onclose=()=>{reconnectAttempts++;const d=Math.min(2000*Math.pow(2,reconnectAttempts-1),30000);reconnectTimer=setTimeout(connect,d);};
}
connect();
</script>
</body>
</html>
