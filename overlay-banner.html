<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<title>Mackinac — Unified Banner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', Tahoma, sans-serif; }
body { background-color: transparent; overflow: hidden; width: 2560px; height: 120px; }

/* ══════════════════════════════════════════════════
   SHIP LAYER — always visible at the bottom.
   The two tickers (z-index 1000) slide up over it.
══════════════════════════════════════════════════ */
.ship-layer {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 120px;
    z-index: 999;                   /* sits just under both tickers */
    display: flex;
    align-items: center;
    padding: 0 15px;
    gap: 0;
    /* matches the ticker background so colours always sync */
    background: var(--dynamic-background, linear-gradient(to bottom, skyblue, lightgrey));
    color: var(--dynamic-text-color, black);
}

/* left branding block */
.ship-branding {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-width: 200px; flex-shrink: 0;
    border-right: 2px solid rgba(0,0,0,0.15);
    padding-right: 15px; margin-right: 15px;
}
.ship-branding-title {
    font-size: 1.7rem; font-weight: bold; letter-spacing: 1px;
    white-space: nowrap; color: inherit;
}
.ship-branding-sub { font-size: 1.1rem; opacity: 0.6; white-space: nowrap; }

/* chips */
.ships-row { flex: 1; overflow: hidden; position: relative; }
.ships-inner { display: flex; align-items: center; gap: 14px; width: max-content; }

.ship-chip {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.1);
    border: 2px solid rgba(0,0,0,0.2);
    border-radius: 28px;
    padding: 12px 24px; flex-shrink: 0;
    font-size: 1.6rem; font-weight: bold; color: inherit;
    transition: border-color 0.3s, background 0.3s;
}
.ship-chip.approaching { border-color: rgba(0,130,0,0.5);  background: rgba(0,140,0,0.12); }
.ship-chip.departing   { border-color: rgba(160,80,0,0.45); background: rgba(170,90,0,0.1); }
.ship-chip.near-bridge { border-color: rgba(200,0,0,0.6);   background: rgba(200,0,0,0.12); animation: chipPulse 1s infinite; }
.ship-chip.passed      { border-color: rgba(0,0,0,0.2);     background: rgba(0,0,0,0.06); opacity: 0.72; }
@keyframes chipPulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
.chip-passed-tag {
    font-size: 1.05rem; font-weight: bold; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap;
    background: rgba(0,0,0,0.1); padding: 3px 12px; border-radius: 12px;
}
.chip-ago { opacity: 0.5; font-size: 1.1rem; white-space: nowrap; }

.chip-arrow { font-size: 1.6rem; }
.chip-name  { font-weight: bold; }
.chip-dist  { opacity: 0.6; font-size: 1.4rem; }
.chip-speed { opacity: 0.5; font-size: 1.2rem; }
.chip-eta   { font-size: 1.2rem; font-weight: bold; color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
.no-ships-bar { opacity: 0.45; font-size: 1.6rem; font-weight: bold; }

/* live dot */
.live-area {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto; padding-left: 18px;
    border-left: 2px solid rgba(0,0,0,0.12);
    flex-shrink: 0;
}
.live-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(180,0,0,0.5); }
.live-dot.on { background: #007700; animation: livePulse 2s infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.live-label { font-size: 0.85rem; font-weight: bold; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

/* QR code — fixed to right side of Riviera ticker */
.qr-area {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
}
.qr-area img {
    width: 88px; height: 88px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.4);
    display: block;
}
.qr-label {
    font-size: 11px; font-weight: bold;
    color: inherit; opacity: 0.7;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

/* ══════════════════════════════════════════════════
   TICKERS — your original styles, unchanged
══════════════════════════════════════════════════ */
.ticker-wrap {
    width: 100%;
    height: 120px;
    overflow: hidden;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    padding: 0 15px;
    background: var(--dynamic-background, linear-gradient(to bottom, skyblue, lightgrey));
    color: var(--dynamic-text-color, black);
}
.ticker {
    display: flex;
    align-items: center;
    min-width: 100%;
}
.ticker-1 { justify-content: center; }
.ticker-item, .weather-box {
    display: flex;
    align-items: center;
    padding: 0 30px;
    white-space: nowrap;
    font-size: 30px;
    font-weight: bold;
    color: inherit;
}
.ticker-item i, .weather-box i { margin-right: 14px; color: red; }
.weather-box img { height: 2.4rem; margin-right: 10px; }

/* === TICKER 1: Weather + Stream Info === */
.ticker-wrap-1 { animation: bannerCycle1 300s ease-in-out infinite; z-index: 1000; }
.ticker-1      { animation: textScroll1  300s linear      infinite; }

/* === TICKER 2: Riviera Motel — slides OVER ticker 1, same down === */
.ticker-wrap-2 { animation: bannerCycle2 300s ease-in-out infinite; z-index: 1001; padding-left: 125px; }
.ticker-2      { animation: textScroll2  300s linear      infinite; }

/*
    300s (5 min) cycle breakdown:
    -----------------------------------------------
    0s-6s      Banner 1 slides UP
    6s-51s     Ticker 1 text visible (45s)
    51s-57s    Ticker 2 slides UP over Ticker 1 (no gap)
    57s-102s   Ticker 2 text visible (45s)
    102s-108s  BOTH slide DOWN together (one single exit)
    108s-300s  Ships visible (192s — over 3 min)
    -----------------------------------------------
*/

/* --- Banner 1: slides up at start, stays up through both tickers, slides down at end --- */
@keyframes bannerCycle1 {
    0%   { transform: translateY(100%); }   /* hidden */
    2%   { transform: translateY(0); }      /* up by 6s */
    34%  { transform: translateY(0); }      /* stays up until 102s */
    36%  { transform: translateY(100%); }   /* down by 108s */
    100% { transform: translateY(100%); }   /* stay hidden */
}

/* --- Text scroll for banner 1 (active window: 6s–51s) --- */
@keyframes textScroll1 {
    0%    { transform: translateX(100%); }  /* offscreen right */
    2.7%  { transform: translateX(100%); }  /* wait for banner (8s) */
    5.3%  { transform: translateX(0); }     /* scrolled in by 16s */
    14.3% { transform: translateX(0); }     /* sit still until 43s */
    17%   { transform: translateX(-100%); } /* scrolled off by 51s */
    100%  { transform: translateX(-100%); } /* stay offscreen */
}

/* --- Banner 2: slides UP over banner 1 at 51s, slides down together at 102s --- */
@keyframes bannerCycle2 {
    0%   { transform: translateY(100%); }   /* hidden */
    17%  { transform: translateY(100%); }   /* stay hidden until 51s */
    19%  { transform: translateY(0); }      /* up by 57s (slides over ticker 1) */
    34%  { transform: translateY(0); }      /* stays up until 102s */
    36%  { transform: translateY(100%); }   /* down by 108s (same as ticker 1) */
    100% { transform: translateY(100%); }   /* stay hidden */
}

/* --- Text scroll for banner 2 (active window: 57s–102s) --- */
@keyframes textScroll2 {
    0%    { transform: translateX(100%); }  /* offscreen right */
    19.7% { transform: translateX(100%); }  /* wait for banner (59s) */
    22.3% { transform: translateX(0); }     /* scrolled in by 67s */
    31.3% { transform: translateX(0); }     /* sit still until 94s */
    34%   { transform: translateX(-100%); } /* scrolled off by 102s */
    100%  { transform: translateX(-100%); } /* stay offscreen */
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SHIP LAYER — default visible state
══════════════════════════════════════════════════ -->
<div class="ship-layer" id="shipLayer">
    <div class="ship-branding">
        <span class="ship-branding-title">Mackinac Straits</span>
        <span class="ship-branding-sub" id="brandingSub">Live Ship Tracker</span>
    </div>
    <div class="ships-row" id="shipsRow">
        <div class="ships-inner" id="shipsInner">
            <span class="no-ships-bar">Connecting…</span>
        </div>
    </div>
    <div class="live-area">
        <div class="live-dot" id="liveDot"></div>
        <span class="live-label">Live</span>
    </div>
</div>

<!-- ══════════════════════════════════════════════════
     TICKER 1: Weather + Stream Info  (original)
══════════════════════════════════════════════════ -->
<div class="ticker-wrap ticker-wrap-1">
    <div class="ticker ticker-1">
        <div class="ticker-item">
            <i class="fas fa-video"></i> Live Stream of the Mackinac Bridge from the Riviera Motel!
        </div>
        <div class="ticker-item">
            <i class="fas fa-info-circle"></i> Subscribe to the channel for more updates!
        </div>
        <div class="ticker-item weather-box" id="id-weather">
            <i class="fa-solid fa-cloud-sun"></i>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════════
     TICKER 2: Riviera Motel  (original)
══════════════════════════════════════════════════ -->
<div class="ticker-wrap ticker-wrap-2">
    <div class="ticker ticker-2">
        <div class="ticker-item">
            <i class="fas fa-bed"></i> The Riviera Motel is NOW OPEN for reservations | Visit ShadowoftheBridge.com and book your room NOW!
        </div>
    </div>
    <div class="qr-area">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=88x88&data=https://shadowofthebridge.com&bgcolor=ffffff&color=000000&margin=4" alt="Scan to book">
        <span class="qr-label">Book Now</span>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  WEATHER — original logic, jQuery replaced with fetch()
// ═══════════════════════════════════════════════════════════
var yourApiKey     = "8d6e0169a641adc002688e82b9ab8ec3";
var yourCity       = "Mackinaw City, MI";  // display label only
var yourLat        = 45.7829;              // Mackinaw City exact coordinates
var yourLon        = -84.7278;
var yourUnits      = "imperial";
var iconHeight     = "50px";
var clockSeperator = "-";
var time24hour     = false;

function refreshData() {
    weatherCheck();
    setTimeout(refreshData, 60000);
}
function weatherCheck() {
    var time = time24hour ? time24(new Date()) : currentTime(new Date());
    fetch('https://api.openweathermap.org/data/2.5/weather?units=' + yourUnits +
          '&lat=' + yourLat + '&lon=' + yourLon + '&appid=' + yourApiKey)
        .then(function(r) { return r.json(); })
        .then(function(apiResponse) {
            var weatherDescription = toProperCase(apiResponse.weather[0].description);
            var curtemp   = Math.round(apiResponse.main.temp);
            var iconCode  = apiResponse.weather[0].icon;
            var iconUrl   = 'https://openweathermap.org/img/wn/' + iconCode + '@2x.png';
            var isDaytime = iconCode.slice(-1) === 'd';
            var backgroundGradient = isDaytime
                ? 'linear-gradient(to bottom, skyblue, lightgrey)'
                : 'linear-gradient(to bottom, black, dimgrey)';
            var textColor = isDaytime ? 'black' : 'white';
            document.documentElement.style.setProperty('--dynamic-background', backgroundGradient);
            document.documentElement.style.setProperty('--dynamic-text-color', textColor);
            if (document.getElementById('id-weather')) {
                document.getElementById('id-weather').innerHTML =
                    yourCity + ': ' + curtemp + '&deg; ' +
                    '<img style="height:' + iconHeight + ';" src="' + iconUrl + '"> ' +
                    weatherDescription + ' ' + clockSeperator + ' ' + time;
            }
            // Also update the subtle sub-line in the ship bar branding
            document.getElementById('brandingSub').textContent =
                curtemp + '°F · ' + weatherDescription;
        })
        .catch(function(err) { console.error('Weather fetch failed:', err); });
}
function currentTime(date) {
    var h=date.getHours(), m=date.getMinutes(), ap=h>=12?'PM':'AM';
    h=h%12; h=h?h:12; m=m<10?'0'+m:m;
    return h+':'+m+' '+ap;
}
function time24(date) {
    var h=date.getHours(), m=date.getMinutes();
    return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function toProperCase(str) {
    return str.replace(/\w\S*/g, function(t) {
        return t.charAt(0).toUpperCase() + t.substr(1).toLowerCase();
    });
}

// ═══════════════════════════════════════════════════════════
//  SHIP TRACKER
// ═══════════════════════════════════════════════════════════
var RENDER_URL    = 'mackinac-ship-tracker.onrender.com';
var isLocalhost   = location.hostname==='localhost'||location.hostname==='127.0.0.1';
var WS_URL        = isLocalhost ? 'ws://localhost:'+(location.port||3000) : 'wss://'+RENDER_URL;
var BRIDGE_LAT    = 45.8174, BRIDGE_LON = -84.7278;
var MAX_DIST_MI   = 100;

var shipData={}, staticData={}, ws, reconnectTimer, reconnectAttempts=0;

// Passings are detected server-side (longitude crossing) and stored in
// MongoDB — the banner just polls /api/ships/recent so records survive
// page refreshes and OBS restarts.
var passedShips=[];
var PASSED_MAX_AGE_MS=6*60*60*1000; // don't show chips older than 6 hours
var HTTP_BASE=isLocalhost?'http://localhost:'+(location.port||3000):'https://'+RENDER_URL;
function refreshPassedShips(){
    fetch(HTTP_BASE+'/api/ships/recent?limit=5')
        .then(function(r){return r.json();})
        .then(function(d){
            passedShips=(d.ships||[]).map(function(s){return {mmsi:s.mmsi,name:s.name,passedTime:new Date(s.passedTime).getTime()};});
            render();
        })
        .catch(function(e){console.error('Passed-ships fetch failed:',e);});
}
setInterval(refreshPassedShips,60000);

// ── FERRY BLOCKLIST ───────────────────────────────────────────
// Vessels that should never appear on the banner.
// To add a new one: look up the MMSI on MarineTraffic and add it below.
var BLOCKED_MMSI = {
    368165150: 'WILLIAM RICHARD',      // Inland ferry, classified as "Other" — slips type filter
    367031360: 'MARQUETTE II',         // Mackinac Island passenger ferry
    367139210: 'EMERALD ISLE',         // Beaver Island Ro-Ro/Passenger ferry
    367349450: 'DRUMMOND ISLANDER IV', // Drummond Island passenger ferry
    367721870: 'WYANDOT',              // Shepler's Mackinac Island ferry, classified as "Other"
    367721930: 'CAPT. SHEPLER',        // Shepler's Mackinac Island ferry, classified as "Other"
    367721960: 'THE HOPE',             // Shepler's Mackinac Island ferry, classified as "Passenger"
    367782080: 'OTTAWA',               // Mackinac Island ferry, "Other" type
    338158987: 'UGLE DUCKLING',        // Dredger, local vessel
    338926364: 'CUTTER BOAT LARGE',    // SAR rescue boat, 7m vessel
};
// ─────────────────────────────────────────────────────────────

// AIS type 60-69 = Passenger vessels (ferries, excursion boats, etc.)
// We hide these since they don't pass under the Mackinac Bridge
var ALLOWED_MMSI = {
    311050300: 'VICTORY II',              // Great Lakes passenger cruise ship, St. Ignace → Marquette
};

function shouldHide(mmsi){
    if (ALLOWED_MMSI[mmsi]) return false;                   // always show whitelisted vessels
    if (BLOCKED_MMSI[mmsi]) return true;                    // explicit blocklist
    var t = staticData[mmsi] && staticData[mmsi].type;
    return t && t >= 60 && t <= 69;                         // passenger type filter
}

function haversine(lat1,lon1,lat2,lon2){
    var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toMiles(km){return km*0.621371;}
function getDirection(lat,lon,course){
    var dLat=lat-BRIDGE_LAT,dLon=lon-BRIDGE_LON;
    var tb=(Math.atan2(-dLon,-dLat)*180/Math.PI+360)%360;
    return Math.abs(((course-tb)+180+360)%360-180)<90?'Approaching':'Departing';
}
function formatETA(distKm,spd){
    if(!spd||spd<0.5)return null;
    var min=Math.round(distKm/(spd*1.852)*60);
    if(min>600)return null;
    return min<60?min+'m':Math.floor(min/60)+'h'+(min%60?min%60+'m':'');
}

var PAGE_HOLD_MS=15000,pageOffsets=[],currentPage=0,pageTimer=null,lastShipKey='';

function buildPageOffsets(){
    var inner=document.getElementById('shipsInner'),row=document.getElementById('shipsRow');
    if(!inner||!row)return[0];
    var avail=row.offsetWidth,chips=[].slice.call(inner.querySelectorAll('.ship-chip'));
    if(!chips.length)return[0];
    var offsets=[0],px=0,pw=0;
    chips.forEach(function(c){var w=c.offsetWidth+10;if(pw>0&&pw+w>avail){px+=pw;offsets.push(px);pw=w;}else pw+=w;});
    return offsets;
}
function showPage(idx){
    var inner=document.getElementById('shipsInner');
    if(!inner||!pageOffsets.length)return;
    inner.style.transition='transform 2s ease-in-out';
    inner.style.transform='translateX(-'+pageOffsets[idx%pageOffsets.length]+'px)';
}
function startPaging(){
    if(pageTimer){clearInterval(pageTimer);pageTimer=null;}
    currentPage=0;showPage(0);
    if(pageOffsets.length<=1)return;
    pageTimer=setInterval(function(){currentPage=(currentPage+1)%pageOffsets.length;showPage(currentPage);},PAGE_HOLD_MS);
}
function formatAgo(passedTime){
    var min=Math.round((Date.now()-passedTime)/60000);
    if(min<1)return 'just now';
    if(min<60)return min+' min ago';
    var h=Math.floor(min/60),m=min%60;
    return h+'h'+(m?' '+m+'m':'')+' ago';
}
function buildPassedChipHTML(ship){
    var agoStr=formatAgo(ship.passedTime);
    return '<div class="ship-chip passed" data-mmsi="'+ship.mmsi+'">'+
        '<span class="chip-arrow">&#10003;</span>'+
        '<span class="chip-name">'+ship.name+'</span>'+
        '<span class="chip-passed-tag">Passed the Bridge</span>'+
        '<span class="chip-ago">'+agoStr+'</span>'+
        '</div>';
}
function buildChipHTML(ship){
    var mi=toMiles(ship.distance).toFixed(1);
    var spd=ship.speed?ship.speed.toFixed(1)+' kts':'';
    var eta=ship.direction==='Approaching'?formatETA(ship.distance,ship.speed):null;
    var isNear=ship.distance<8;
    var cls=isNear?'near-bridge':ship.direction==='Approaching'?'approaching':'departing';
    var arrow=isNear?'&#9889;':ship.direction==='Approaching'?'&#9650;':'&#9660;';
    return '<div class="ship-chip '+cls+'" data-mmsi="'+ship.mmsi+'">'+
        '<span class="chip-arrow">'+arrow+'</span>'+
        '<span class="chip-name">'+ship.name+'</span>'+
        '<span class="chip-dist">'+mi+' mi</span>'+
        (spd?'<span class="chip-speed">'+spd+'</span>':'')+
        (eta?'<span class="chip-eta">ETA '+eta+'</span>':'')+
        '</div>';
}
function updateChipValues(ships){
    ships.forEach(function(ship){
        var chip=document.querySelector('.ship-chip[data-mmsi="'+ship.mmsi+'"]');
        if(!chip)return;
        var mi=toMiles(ship.distance).toFixed(1);
        var isNear=ship.distance<8;
        var eta=ship.direction==='Approaching'?formatETA(ship.distance,ship.speed):null;
        chip.className='ship-chip '+(isNear?'near-bridge':ship.direction==='Approaching'?'approaching':'departing');
        chip.querySelector('.chip-arrow').innerHTML=isNear?'&#9889;':ship.direction==='Approaching'?'&#9650;':'&#9660;';
        chip.querySelector('.chip-dist').textContent=mi+' mi';
        var spdEl=chip.querySelector('.chip-speed');if(spdEl)spdEl.textContent=ship.speed?ship.speed.toFixed(1)+' kts':'';
        var etaEl=chip.querySelector('.chip-eta');if(etaEl)etaEl.textContent=eta?'ETA '+eta:'';
    });
}
function render(){
    var all=Object.keys(shipData).map(function(k){return shipData[k];}).filter(function(s){return s.speed>0.5&&toMiles(s.distance)<=MAX_DIST_MI&&!shouldHide(s.mmsi);});
    var approaching=all.filter(function(s){return s.direction==='Approaching';}).sort(function(a,b){return a.distance-b.distance;});
    var active=approaching.length>0?approaching:all.sort(function(a,b){return a.distance-b.distance;}).slice(0,3);
    var needed=Math.max(0,3-active.length);
    var activeMmsis=active.map(function(s){return s.mmsi;});
    passedShips=passedShips.filter(function(p){return (Date.now()-p.passedTime)<PASSED_MAX_AGE_MS;});
    var padWith=passedShips.filter(function(p){return activeMmsis.indexOf(p.mmsi)===-1;}).slice(0,needed);
    var inner=document.getElementById('shipsInner');
    var newKey=active.map(function(s){return s.mmsi;}).join(',')+('|'+padWith.map(function(p){return p.mmsi;}).join(','));
    if(!active.length&&!padWith.length){
        if(lastShipKey!=='empty'){
            if(pageTimer){clearInterval(pageTimer);pageTimer=null;}
            inner.style.transition='none';inner.style.transform='translateX(0)';
            inner.innerHTML='<span class="no-ships-bar">No approaching vessels nearby</span>';
            lastShipKey='empty';
        }
    }else if(newKey!==lastShipKey){
        lastShipKey=newKey;
        if(pageTimer){clearInterval(pageTimer);pageTimer=null;}
        inner.style.transition='none';inner.style.transform='translateX(0)';
        inner.innerHTML=active.map(buildChipHTML).join('')+padWith.map(buildPassedChipHTML).join('');
        setTimeout(function(){pageOffsets=buildPageOffsets();startPaging();},80);
    }else{
        updateChipValues(active);
        padWith.forEach(function(ship){
            var chip=document.querySelector('.ship-chip.passed[data-mmsi="'+ship.mmsi+'"]');
            if(!chip)return;
            var agoEl=chip.querySelector('.chip-ago');
            if(agoEl)agoEl.textContent=formatAgo(ship.passedTime);
        });
    }
    checkBannerMode();
}
function processMessage(data){
    if(data.MessageType==='ShipStaticData'&&data.Message&&data.Message.ShipStaticData){
        var mmsi=data.MetaData.MMSI;
        staticData[mmsi]={
            type: data.Message.ShipStaticData.Type||null,
            destination: (data.Message.ShipStaticData.Destination||'').trim()||null
        };
        render(); return;
    }
    if(data.MessageType==='PositionReport'&&data.Message&&data.Message.PositionReport){
        var pos=data.Message.PositionReport,meta=data.MetaData;
        var dist=haversine(BRIDGE_LAT,BRIDGE_LON,pos.Latitude,pos.Longitude);
        shipData[meta.MMSI]={mmsi:meta.MMSI,name:(meta.ShipName||'Unknown').trim(),
            lat:pos.Latitude,lon:pos.Longitude,speed:pos.Sog||0,course:pos.Cog||0,
            distance:dist,direction:getDirection(pos.Latitude,pos.Longitude,pos.Cog||0),lastUpdate:Date.now()};
        var cut=Date.now()-600000;
        Object.keys(shipData).forEach(function(k){if(shipData[k].lastUpdate<cut)delete shipData[k];});
        render();
    }
}
function setLive(on){document.getElementById('liveDot').className='live-dot'+(on?' on':'');}
function manualRetry(){reconnectAttempts=0;connect();}
document.addEventListener('visibilitychange',function(){if(!document.hidden&&(!ws||ws.readyState===WebSocket.CLOSED))manualRetry();});
function connect(){
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
    setLive(false);ws=new WebSocket(WS_URL);
    ws.onopen=function(){reconnectAttempts=0;setLive(true);};
    ws.onmessage=function(e){try{var m=JSON.parse(e.data);if(m.type==='ship_data')processMessage(m.data);else if(m.type==='bridge_passing')refreshPassedShips();}catch(ex){}};
    ws.onerror=function(){setLive(false);};
    ws.onclose=function(){setLive(false);reconnectAttempts++;var d=Math.min(2000*Math.pow(2,reconnectAttempts-1),30000);reconnectTimer=setTimeout(connect,d);};
}

// ═══════════════════════════════════════════════════════════
//  BANNER VISIBILITY — hide everything when ships are far
//  • ETA of closest vessel > 60 min  → far mode
//  • Far mode: visible 1 min, hidden 2.5 min, repeat
//  • ETA ≤ 60 min → near mode: always visible, normal cycle
// ═══════════════════════════════════════════════════════════
var ETA_NEAR_MIN    = 60;       // threshold in minutes
var BANNER_SHOW_MS  = 60000;    // 1 minute visible
var BANNER_HIDE_MS  = 150000;   // 2.5 minutes hidden
var BANNER_TRANS    = '0.6s ease-in-out';

var farModeActive   = false;
var bannerCycleTimer= null;

function getClosestApproachingETA(){
    var vessels = Object.keys(shipData).map(function(k){return shipData[k];})
        .filter(function(s){return s.speed>0.5 && toMiles(s.distance)<=MAX_DIST_MI && !shouldHide(s.mmsi) && s.direction==='Approaching';})
        .sort(function(a,b){return a.distance-b.distance;});
    if(!vessels.length) return null;
    var v = vessels[0];
    var min = Math.round(v.distance/(v.speed*1.852)*60);
    return min;
}

function slideBannerDown(){
    var sl=document.getElementById('shipLayer');
    var t1=document.querySelector('.ticker-wrap-1');
    var t2=document.querySelector('.ticker-wrap-2');
    if(sl){sl.style.transition='transform '+BANNER_TRANS;sl.style.transform='translateY(100%)';}
    if(t1){t1.style.transition='transform '+BANNER_TRANS;t1.style.transform='translateY(100%)';t1.style.animationPlayState='paused';}
    if(t2){t2.style.transition='transform '+BANNER_TRANS;t2.style.transform='translateY(100%)';t2.style.animationPlayState='paused';}
}

function slideBannerUp(){
    var sl=document.getElementById('shipLayer');
    var t1=document.querySelector('.ticker-wrap-1');
    var t2=document.querySelector('.ticker-wrap-2');
    // Ship layer slides up
    if(sl){sl.style.transition='transform '+BANNER_TRANS;sl.style.transform='translateY(0)';}
    // Restart ticker CSS animations from the beginning of their 300s cycle
    [t1,t2].forEach(function(t){
        if(!t)return;
        t.style.transition='';
        t.style.transform='';
        t.style.animationPlayState='';
        t.style.animation='none';
        void t.offsetWidth; // force reflow so animation resets to 0%
        t.style.animation='';
    });
}

function startFarMode(){
    if(farModeActive)return;
    farModeActive=true;
    console.log('Banner far mode: cycling (1min on / 2.5min off)');
    function cycle(){
        // Re-check before hiding — vessel may have gotten closer
        var eta=getClosestApproachingETA();
        if(eta!==null && eta<=ETA_NEAR_MIN){stopFarMode();return;}
        slideBannerDown();
        bannerCycleTimer=setTimeout(function(){
            var eta2=getClosestApproachingETA();
            if(eta2!==null && eta2<=ETA_NEAR_MIN){stopFarMode();return;}
            slideBannerUp();
            bannerCycleTimer=setTimeout(cycle, BANNER_SHOW_MS);
        }, BANNER_HIDE_MS);
    }
    // Show first, then start cycle
    slideBannerUp();
    bannerCycleTimer=setTimeout(cycle, BANNER_SHOW_MS);
}

function stopFarMode(){
    if(!farModeActive)return;
    farModeActive=false;
    if(bannerCycleTimer){clearTimeout(bannerCycleTimer);bannerCycleTimer=null;}
    console.log('Banner near mode: vessel within 60 min — always visible');
    slideBannerUp();
}

function checkBannerMode(){
    var eta=getClosestApproachingETA();
    var isFar=(eta===null || eta>ETA_NEAR_MIN);
    if(isFar && !farModeActive) startFarMode();
    else if(!isFar && farModeActive) stopFarMode();
}

window.onload = function() { refreshData(); connect(); refreshPassedShips(); };
</script>
