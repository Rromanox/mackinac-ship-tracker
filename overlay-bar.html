<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mackinac — Bar Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: transparent;
    font-family: 'Arial', sans-serif;
    width: 1280px;
    height: 68px;
    overflow: hidden;
}
.bar {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(0,0,0,0.78);
    border-top: 2px solid rgba(255,255,255,0.1);
    height: 68px;
    padding: 0 18px;
    backdrop-filter: blur(10px);
    transition: border-color 0.5s;
}
.bar.near { border-top-color: #ef5350; box-shadow: 0 -2px 20px rgba(239,83,80,0.3); }

.branding {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 170px;
    border-right: 1px solid rgba(255,255,255,0.12);
    padding-right: 16px;
    margin-right: 16px;
}
.branding-title {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1.5px;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
}
.branding-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
}

.ships-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    overflow: hidden;
}

.ship-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 12px;
    flex-shrink: 0;
    transition: border-color 0.3s, background 0.3s;
}
.ship-chip.approaching { border-color: rgba(0,230,118,0.35); background: rgba(0,230,118,0.07); }
.ship-chip.departing   { border-color: rgba(255,152,0,0.3);  background: rgba(255,152,0,0.06); }
.ship-chip.near-bridge { border-color: rgba(239,83,80,0.6);  background: rgba(239,83,80,0.12); animation: chipPulse 1s infinite; }
@keyframes chipPulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

.chip-arrow { font-size: 14px; }
.chip-name  { font-size: 13px; font-weight: bold; color: #fff; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-dist  { font-size: 12px; color: rgba(255,255,255,0.5); }
.chip-speed { font-size: 11px; color: rgba(255,255,255,0.38); }
.chip-eta   { font-size: 11px; color: #4fc3f7; font-weight: bold; }

.no-ships-bar { color: rgba(255,255,255,0.25); font-size: 11px; }

.live-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 48px;
    margin-left: auto;
    padding-left: 14px;
    border-left: 1px solid rgba(255,255,255,0.1);
}
.live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ef5350;
}
.live-dot.on { background: #00e676; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.live-label { font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="bar" id="bar">
    <div class="branding">
        <span class="branding-title">🌉 Mackinac Straits</span>
        <span class="branding-sub">Live Ship Tracker</span>
    </div>
    <div class="ships-row" id="shipsRow">
        <span class="no-ships-bar">Connecting…</span>
    </div>
    <div class="live-area">
        <div class="live-dot" id="liveDot"></div>
        <span class="live-label">Live</span>
    </div>
</div>

<script>
const RENDER_URL   = 'mackinac-ship-tracker.onrender.com';
const isLocalhost  = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const WS_URL       = isLocalhost ? `ws://localhost:${location.port||3000}` : `wss://${RENDER_URL}`;
const BRIDGE_LAT   = 45.8174, BRIDGE_LON = -84.7278;
const MAX_DIST_MI  = 62; // ~100km

let shipData = {}, staticData = {};
let ws, reconnectTimer, reconnectAttempts = 0;

function haversine(lat1,lon1,lat2,lon2){
    const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toMiles(km){ return km*0.621371; }
function getDirection(lat,lon,course){
    const dLat=lat-BRIDGE_LAT,dLon=lon-BRIDGE_LON;
    const toBridge=(Math.atan2(-dLon,-dLat)*180/Math.PI+360)%360;
    return Math.abs(((course-toBridge)+180+360)%360-180)<90?'Approaching':'Departing';
}
function formatETA(distKm,spd){
    if(!spd||spd<0.5)return null;
    const min=Math.round(distKm/(spd*1.852)*60);
    if(min>600)return null;
    return min<60?min+'m':Math.floor(min/60)+'h'+(min%60?''+min%60+'m':'');
}

function render(){
    const ships = Object.values(shipData)
        .filter(s=>s.speed>0.5 && toMiles(s.distance)<=MAX_DIST_MI)
        .sort((a,b)=>a.distance-b.distance)
        .slice(0,5);

    const bar = document.getElementById('bar');
    const hasNear = ships.some(s=>s.distance<8);
    bar.className = 'bar' + (hasNear?' near':'');

    if(!ships.length){
        document.getElementById('shipsRow').innerHTML='<span class="no-ships-bar">No active vessels nearby</span>';
        return;
    }

    const approaching=ships.filter(s=>s.direction==='Approaching');
    const others=ships.filter(s=>s.direction!=='Approaching');
    const display=[...approaching,...others].slice(0,5);

    document.getElementById('shipsRow').innerHTML = display.map(ship=>{
        const mi=toMiles(ship.distance).toFixed(1);
        const spd=ship.speed?ship.speed.toFixed(1)+' kts':'';
        const eta=ship.direction==='Approaching'?formatETA(ship.distance,ship.speed):null;
        const isNear=ship.distance<8;
        const cls=isNear?'near-bridge':ship.direction==='Approaching'?'approaching':'departing';
        const arrow=isNear?'⚡':ship.direction==='Approaching'?'▲':'▼';
        return `<div class="ship-chip ${cls}">
            <span class="chip-arrow">${arrow}</span>
            <span class="chip-name">${ship.name}</span>
            <span class="chip-dist">${mi} mi</span>
            ${spd?`<span class="chip-speed">${spd}</span>`:''}
            ${eta?`<span class="chip-eta">ETA ${eta}</span>`:''}
        </div>`;
    }).join('');
}

function processMessage(data){
    if(data.MessageType==='ShipStaticData'&&data.Message?.ShipStaticData){
        staticData[data.MetaData.MMSI]={destination:data.Message.ShipStaticData.Destination?.trim()||null};
        render(); return;
    }
    if(data.MessageType==='PositionReport'&&data.Message?.PositionReport){
        const pos=data.Message.PositionReport,meta=data.MetaData;
        const dist=haversine(BRIDGE_LAT,BRIDGE_LON,pos.Latitude,pos.Longitude);
        shipData[meta.MMSI]={mmsi:meta.MMSI,name:meta.ShipName?.trim()||'Unknown',
            lat:pos.Latitude,lon:pos.Longitude,speed:pos.Sog||0,course:pos.Cog||0,
            distance:dist,direction:getDirection(pos.Latitude,pos.Longitude,pos.Cog||0),lastUpdate:Date.now()};
        const cut=Date.now()-600000;
        Object.keys(shipData).forEach(k=>{if(shipData[k].lastUpdate<cut)delete shipData[k];});
        render();
    }
}
function setLive(on){ document.getElementById('liveDot').className='live-dot'+(on?' on':''); }
function manualRetry(){ reconnectAttempts=0; connect(); }
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&(!ws||ws.readyState===WebSocket.CLOSED))manualRetry();});
function connect(){
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
    setLive(false); ws=new WebSocket(WS_URL);
    ws.onopen=()=>{reconnectAttempts=0;setLive(true);};
    ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='ship_data')processMessage(m.data);}catch{}};
    ws.onerror=()=>setLive(false);
    ws.onclose=()=>{setLive(false);reconnectAttempts++;const d=Math.min(2000*Math.pow(2,reconnectAttempts-1),30000);reconnectTimer=setTimeout(connect,d);};
}
connect();
</script>
</body>
</html>
