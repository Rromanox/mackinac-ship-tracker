<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mackinac — Minimal Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; font-family: 'Arial', sans-serif; padding: 6px; width: 500px; }

.pills { display: flex; flex-direction: column; gap: 5px; }

.pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    padding: 7px 16px;
    backdrop-filter: blur(10px);
    transition: border-color 0.4s, background 0.4s;
    white-space: nowrap;
    overflow: hidden;
}
.pill.approaching { border-color: rgba(0,230,118,0.3); }
.pill.departing   { border-color: rgba(255,152,0,0.25); }
.pill.near-bridge { border-color: rgba(239,83,80,0.55); background: rgba(239,83,80,0.08); animation: p 1s infinite; }
@keyframes p { 0%,100%{opacity:1} 50%{opacity:0.8} }

.pill-icon  { font-size: 13px; flex-shrink: 0; }
.pill-name  { font-size: 13px; font-weight: bold; color: #fff; flex-shrink: 0; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.pill-sep   { color: rgba(255,255,255,0.2); font-size: 11px; }
.pill-dist  { font-size: 12px; font-weight: bold; flex-shrink: 0; }
.pill-dist.green  { color: #00e676; }
.pill-dist.orange { color: #ff9800; }
.pill-dist.red    { color: #ef5350; }
.pill-speed { font-size: 11px; color: rgba(255,255,255,0.45); flex-shrink: 0; }
.pill-eta   { font-size: 11px; color: #4fc3f7; font-weight: bold; flex-shrink: 0; }
.pill-dir   { font-size: 11px; color: rgba(255,255,255,0.3); flex-shrink: 0; }

.empty {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 30px; padding: 7px 16px;
    color: rgba(255,255,255,0.25); font-size: 11px;
    backdrop-filter: blur(8px);
}
</style>
</head>
<body>
<div class="pills" id="pills">
    <div class="empty">🌉 Connecting to Mackinac Bridge tracker…</div>
</div>

<script>
const RENDER_URL  = 'mackinac-ship-tracker.onrender.com';
const isLocalhost = location.hostname==='localhost'||location.hostname==='127.0.0.1';
const WS_URL      = isLocalhost?`ws://localhost:${location.port||3000}`:`wss://${RENDER_URL}`;
const BRIDGE_LAT=45.8174,BRIDGE_LON=-84.7278,MAX_DIST_MI=62;

let shipData={},staticData={},ws,reconnectTimer,reconnectAttempts=0;

function haversine(lat1,lon1,lat2,lon2){
    const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toMiles(km){return km*0.621371;}
function getDirection(lat,lon,course){
    const dLat=lat-BRIDGE_LAT,dLon=lon-BRIDGE_LON;
    const tb=(Math.atan2(-dLon,-dLat)*180/Math.PI+360)%360;
    return Math.abs(((course-tb)+180+360)%360-180)<90?'Approaching':'Departing';
}
function formatETA(distKm,spd){
    if(!spd||spd<0.5)return null;
    const min=Math.round(distKm/(spd*1.852)*60);
    if(min>600)return null;
    return min<60?min+'m':Math.floor(min/60)+'h'+(min%60?min%60+'m':'');
}

function render(){
    const ships=Object.values(shipData)
        .filter(s=>s.speed>0.5&&toMiles(s.distance)<=MAX_DIST_MI)
        .sort((a,b)=>a.distance-b.distance);

    const cont=document.getElementById('pills');
    if(!ships.length){
        cont.innerHTML='<div class="empty">🌉 No active vessels within 62 miles</div>';
        return;
    }

    const approaching=ships.filter(s=>s.direction==='Approaching');
    const others=ships.filter(s=>s.direction!=='Approaching');
    const display=[...approaching,...others].slice(0,4);

    cont.innerHTML=display.map(ship=>{
        const mi=toMiles(ship.distance).toFixed(1);
        const isNear=ship.distance<8;
        const eta=ship.direction==='Approaching'?formatETA(ship.distance,ship.speed):null;
        const cls='pill '+(isNear?'near-bridge':ship.direction==='Approaching'?'approaching':'departing');
        const icon=isNear?'⚡':ship.direction==='Approaching'?'▲':'▼';
        const distCls=isNear?'red':ship.direction==='Approaching'?'green':'orange';
        const parts=[
            `<span class="pill-icon">${icon}</span>`,
            `<span class="pill-name">${ship.name}</span>`,
            `<span class="pill-sep">·</span>`,
            `<span class="pill-dist ${distCls}">${mi} mi</span>`,
        ];
        if(ship.speed){parts.push(`<span class="pill-sep">·</span><span class="pill-speed">${ship.speed.toFixed(1)} kts</span>`);}
        if(eta){parts.push(`<span class="pill-sep">·</span><span class="pill-eta">ETA ${eta}</span>`);}
        return `<div class="${cls}">${parts.join('')}</div>`;
    }).join('');
}

function processMessage(data){
    if(data.MessageType==='ShipStaticData'&&data.Message?.ShipStaticData){
        staticData[data.MetaData.MMSI]={destination:data.Message.ShipStaticData.Destination?.trim()||null};
        render();return;
    }
    if(data.MessageType==='PositionReport'&&data.Message?.PositionReport){
        const pos=data.Message.PositionReport,meta=data.MetaData;
        const dist=haversine(BRIDGE_LAT,BRIDGE_LON,pos.Latitude,pos.Longitude);
        shipData[meta.MMSI]={mmsi:meta.MMSI,name:meta.ShipName?.trim()||'Unknown',
            lat:pos.Latitude,lon:pos.Longitude,speed:pos.Sog||0,course:pos.Cog||0,
            distance:dist,direction:getDirection(pos.Latitude,pos.Longitude,pos.Cog||0),lastUpdate:Date.now()};
        const cut=Date.now()-600000;
        Object.keys(shipData).forEach(k=>{if(shipData[k].lastUpdate<cut)delete shipData[k];});
        render();
    }
}
function manualRetry(){reconnectAttempts=0;connect();}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&(!ws||ws.readyState===WebSocket.CLOSED))manualRetry();});
function connect(){
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
    ws=new WebSocket(WS_URL);
    ws.onopen=()=>{reconnectAttempts=0;};
    ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='ship_data')processMessage(m.data);}catch{}};
    ws.onerror=()=>{};
    ws.onclose=()=>{reconnectAttempts++;const d=Math.min(2000*Math.pow(2,reconnectAttempts-1),30000);reconnectTimer=setTimeout(connect,d);};
}
connect();
</script>
</body>
</html>
